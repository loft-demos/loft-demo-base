apiVersion: management.loft.sh/v1
kind: App
metadata:
  name: github-repo-argo-cd-webhooks
spec:
  displayName: GitHub Repo with Argo CD Webhooks
  owner:
    team: loft-admins
  config:
    chart: {}
    bash:
      script: |
        set -e

        while ! kubectl get crd applicationsets.argoproj.io >/dev/null 2>&1; do
          echo "Waiting for argo cd applicationset crd..."
          sleep 1
        done

        while ! kubectl get secret ghcr-login-secret -n vcluster-platform >/dev/null 2>&1; do
          echo "Waiting for ghcr-login-secret..."
          sleep 1
        done

        while ! kubectl get deployment argocd-repo-server -n argocd >/dev/null 2>&1; do
          echo "Waiting for argocd-repo-server deployment..."
          sleep 2
        done

        while ! kubectl get statefulset argocd-application-controller -n argocd >/dev/null 2>&1; do
          echo "Waiting for argocd-application-controller statefulset..."
          sleep 2
        done

        kubectl rollout status deployment argocd-repo-server -n argocd --timeout=180s
        kubectl rollout status statefulset argocd-application-controller -n argocd --timeout=180s

        while true; do
          REPO_ENDPOINTS="$(kubectl get endpoints argocd-repo-server -n argocd -o jsonpath="{.subsets[*].addresses[*].ip}" 2>/dev/null || true)"
          if [ -n "$REPO_ENDPOINTS" ]; then
            break
          fi
          echo "Waiting for argocd-repo-server endpoints..."
          sleep 2
        done

        while ! kubectl get crd appprojects.argoproj.io >/dev/null 2>&1; do
          echo "Waiting for argo cd appproject crd..."
          sleep 1
        done

        while ! kubectl get appproject default -n argocd >/dev/null 2>&1; do
          echo "Waiting for default AppProject..."
          sleep 1
        done

        PULL_SECRET="$(kubectl get secret ghcr-login-secret -n vcluster-platform -o jsonpath="{.data.\.dockerconfigjson}")"
        REPO_NAME="{{ .Values.loft.virtualClusterName }}-app"
        GIT_REVISION='{{ default "main" .Values.gitRevision }}'
        MARKER_URL="https://raw.githubusercontent.com/loft-demos/${REPO_NAME}/HEAD/.generator-seed/replace-text-complete.txt"
        MARKER_FILE="$(mktemp)"
        trap 'rm -f "$MARKER_FILE"' EXIT

        check_marker() {
          if command -v curl >/dev/null 2>&1; then
            curl -fsS "$MARKER_URL" -o "$MARKER_FILE"
          elif command -v wget >/dev/null 2>&1; then
            wget -qO "$MARKER_FILE" "$MARKER_URL"
          else
            echo "[ERROR] Neither curl nor wget is available to check the replace-text marker."
            return 2
          fi

          grep -Fqx "branch=${GIT_REVISION}" "$MARKER_FILE"
        }

        deadline=$((SECONDS + 900))
        while true; do
          marker_status=0
          if check_marker; then
            echo "Detected replace-text completion marker for ${REPO_NAME} on ${GIT_REVISION}."
            break
          fi
          marker_status=$?

          if [ "$marker_status" -eq 2 ]; then
            exit 1
          fi

          if [ "$SECONDS" -ge "$deadline" ]; then
            echo "[ERROR] Timed out waiting for replace-text completion marker at ${MARKER_URL}"
            exit 1
          fi

          echo "Waiting for replace-text completion marker for ${REPO_NAME}..."
          sleep 20
        done

        cat <<EOF | kubectl apply -f -
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        metadata:
          name: vcluster-gitops
          namespace: argocd
        spec:
          destination:
            server: https://kubernetes.default.svc
          project: default
          source:
            path: vcluster-gitops
            repoURL: https://github.com/loft-demos/{{ .Values.loft.virtualClusterName }}-app.git
            targetRevision: '{{ default "main" .Values.gitRevision }}'
            kustomize:
              patches:
                - target:
                    kind: SharedSecret
                    name: ghcr-login-secret
                  patch: |-
                    - op: replace
                      path: /spec/data/.dockerconfigjson
                      value: $PULL_SECRET
          syncPolicy:
            automated:
              prune: true
              selfHeal: true
            syncOptions:
              - CreateNamespace=true
            retry:
              limit: 14
              backoff:
                duration: 2s
                factor: 2
                maxDuration: 2m
        EOF

        kubectl annotate application vcluster-gitops -n argocd argocd.argoproj.io/refresh=hard --overwrite || true
  parameters:
    - variable: gitRevision
      label: Git Revision
      description: Git revision to use for the generated repo bootstrap application
      type: string
      defaultValue: main
