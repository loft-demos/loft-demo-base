apiVersion: management.loft.sh/v1
kind: App
metadata:
  name: vcluster-platform-demo-configure-admins
spec:
  displayName: vCluster Platform Demo Configure Admins
  description: Configures SSO groups that should get admin privileges
  owner:
    team: loft-admins
  config:
    chart: {}
    bash:
      script: |-
        set -euo pipefail

        echo "Waiting for Team CRD..."
        kubectl wait --for=condition=Established --timeout=60s crd/teams.storage.loft.sh

        echo "Waiting for auto-generated team loft-admins..."
        until kubectl get team.storage.loft.sh loft-admins >/dev/null 2>&1; do
          sleep 1
        done

        echo "Applying admin team overrides..."
        cat <<'EOF' | kubectl apply -f -
        apiVersion: storage.loft.sh/v1
        kind: Team
        metadata:
          name: loft-admins
        spec:
          displayName: Global Admins
          description: All users in this team have full admin access to all clusters
          username: loftadmins
          groups:
            - loft:admins
            - Administration
            - Design
            - DevRel
            - Engineering
            - Marketing
            - Product
            - Sales
          clusterRoles:
            - name: loft-management-admin
          access:
            - name: loft-access
              verbs:
                - get
                - bind
              subresources:
                - clusters
              teams:
                - loft-admins
        EOF

        echo "Annotating loft-cluster..."
        kubectl annotate --overwrite cluster loft-cluster \
          domainPrefix="{{ .Values.loft.virtualClusterName }}" \
          domain="{{ .Values.loft.clusterAnnotations.domain }}" \
          sleepTimeZone="{{ .Values.sleepTimeZone }}"
  parameters:
    - variable: sleepTimeZone
      label: Sleep Time Zone
      description: Time zone used for cluster sleep scheduling
      type: string
      options:
        - "America/Los_Angeles"
        - "America/New_York"
        - "Europe/London"
      defaultValue: "America/New_York"