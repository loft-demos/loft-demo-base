apiVersion: management.loft.sh/v1
kind: App
metadata:
  name: vcluster-platform-demo
spec:
  displayName: vCluster Platform Demo
  description: >-
    vCluster Platform Hierarchical Demo Environment.
  owner:
    team: loft-admins
  recommendedApp:
    - virtualcluster
  defaultNamespace: vcluster-platform
  icon: https://www.vcluster.com/pro/docs/media/vclusterpro_orange.svg
  config:
    chart:
      name: vcluster-platform
      repoURL: https://charts.loft.sh/
  versions:
    - version: 1.490.1
      icon: https://raw.githubusercontent.com/loft-demos/loft-demo-base/refs/heads/main/logos/vCluster_Horizontal_2colors_reversed-2.svg
      defaultNamespace: vcluster-platform
      config:
        chart:
          name: vcluster-platform
          version: 4.9.0-next.1
          repoURL: https://charts.loft.sh/
        values: |-
          admin:
            create: true

          isolation:
            enabled: true
            networkPolicy:
              enabled: false
              
          resources:
            requests:
              memory: 2Gi
              cpu: 500m
            limits:
              memory: 6Gi
              cpu: "2"

          ingress:
            enabled: true
            ingressClass: nginx
            host: '{{ .Values.domain }}'
            tls:
              enabled: true
              secret: ""
              
          insecureSkipVerify: true

          envValueFrom:
            CLIENT_SECRET:
              secretKeyRef:
                name: oidc-secret
                key: clientSecret

          config:
            loftHost: "{{ .Values.domain }}"
            costControl:
              enabled: true
            imageBuilder:
              enabled: false
            uiSettings:
              externalURLs:
                allow:
                  - vcluster
                  - featurebase
              navBarButtons:
              - link: https://www.vcluster.com/docs/platform/
                position: TopEnd
                text: vCluster Docs
              - link: 'https://github.com/loft-demos/{{ .Values.loft.virtualClusterName }}-app/tree/main/vcluster-gitops'
                position: TopEnd
                text: GitHub Repo
              - link: https://flux-{{ .Values.domain }}
                icon: "https://flux-{{ .Values.domain }}/favicon.svg"
                position: TopEnd
                text: Flux UI
              - link: "https://argocd-{{ .Values.domain }}/"
                icon: "https://argocd-{{ .Values.domain }}/assets/favicon/favicon-32x32.png"
                text: "Argo CD"
                position: TopEnd
              {{if .Values.continuousPromotion}}
              - link: https://kargo-{{ .Values.domain }}
                icon: "https://kargo-{{ .Values.domain }}/kargo-logo-white.png"
                position: TopEnd
                text: Kargo
              {{end}}
              - link: https://komoplane-{{ .Values.domain }}
                position: TopEnd
                text: Komoplane
              {{if .Values.uiLogoURL}}
              logoURL: '{{ .Values.uiLogoURL }}'
              {{end}}
              logoBackgroundColor: '{{ .Values.logoBackgroundColor }}'
            auth:
              oidc:
                issuerUrl: https://loft.rocks/oidc
                clientId: loft
                clientSecret: $CLIENT_SECRET
                redirectURI: https://{{ .Values.domain }}/auth/oidc/callback
                groupsClaim: groups
