apiVersion: management.loft.sh/v1
kind: VirtualClusterTemplate
metadata:
  name: vcluster-platform-partner-template
spec:
  displayName: vCluster Platform Partner Environments
  description: >-
    This virtual cluster template deploys a vCluster Platform Demo
    Environment for partners that includes Crossplane, Argo CD, and a dedicated GitHub
    repository for platform GitOps and demo examples.
  owner:
    team: loft-admins
  template:
    metadata: {}
    instanceTemplate:
      metadata: {}
    pro: {}
    helmRelease:
      chart:
        version: 0.20.2
      values: |-
        sync:
          toHost:
            ingresses:
              enabled: true
    accessPoint:
      ingress: {}
    spaceTemplate:
      metadata: {}
  versions:
    - version: 4.7.0
      template:
        metadata:
          labels:
            loft.sh/import-argocd: 'true'
          annotations:
            sleepmode.loft.sh/ignore-user-agents: argo*
        instanceTemplate:
          metadata:
            labels:
              domain: '{{ .Values.loft.clusterAnnotations.domain }}'
              env: '{{ .Values.env }}'
              team: '{{ .Values.loft.project }}'
              vclusterName: '{{ .Values.loft.virtualClusterName }}'
            annotations:
              loft.sh/custom-links: >-
                https://{{ .Values.loft.virtualClusterName }}.{{
                .Values.loft.clusterAnnotations.domain }}
        apps:
          - name: vcluster-platform-partner
            namespace: vcluster-platform
            version: 4.7.0
            parameters: |
              uiLogoURL: '{{ .Values.uiLogoURL }}'
              logoBackgroundColor: '{{ .Values.logoBackgroundColor }}'
              domain: >-
                {{ .Values.loft.virtualClusterName }}.{{
                .Values.loft.clusterAnnotations.domain }}
          - name: argocd
            namespace: argocd
            version: 3.2.6
            parameters: |
              appValues: |-
                global:
                  domain: argocd-{{ .Values.loft.virtualClusterName }}.{{ .Values.loft.clusterAnnotations.domain }}
                configs:
                  cm:
                    url: https://argocd-{{ .Values.loft.virtualClusterName }}.{{ .Values.loft.clusterAnnotations.domain }}
                    create: true
                    timeout.reconciliation: 3d
                    timeout.reconciliation.jitter: 2m
                    application.resourceTrackingMethod: annotation
                    resource.customizations.ignoreDifferences.management.loft.sh_Project: |
                      jqPathExpressions:
                        - .spec.access[] | select(.name == "loft-access") | .subresource
                    resource.customizations.ignoreDifferences.management.loft.sh_VirtualClusterInstance: |
                      jsonPointers:
                        - /spec/parameters
                    globalProjects: |-
                      - labelSelector:
                          matchExpressions:
                            - key: use-global-project-settings
                              operator: In
                              values:
                                - 'true'
                        projectName: global-project
                  params:
                    "server.insecure": true
                    timeout.reconciliation: 0
                    application.namespaces: "argo-apps-*"
                  secret:
                    createSecret: true
                  rbac:
                    policy.csv: |-
                      g, Administration, role:admin
                      g, Sales, role:admin
                      g, Engineering, role:admin
                server:
                  ingress:
                    enabled: true
                    annotations:
                      nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
                      nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
                    ingressClassName: "nginx"
                    hostname: argocd-{{ .Values.loft.virtualClusterName }}.{{ .Values.loft.clusterAnnotations.domain }}
                    tls: true
                  ingressGrpc:
                    enabled: true
                    annotations: 
                      nginx.ingress.kubernetes.io/backend-protocol: "GRPC"
                    ingressClassName: "nginx"
                    hostname: argocd-grpc-{{ .Values.loft.virtualClusterName }}.{{ .Values.loft.clusterAnnotations.domain }}
                    tls: true
                repoServer:
                  resources:
                    requests:
                      cpu: 500m
                      memory: 512Mi
                    limits:
                      cpu: 1000m
                      memory: 1Gi
                ## ApplicationSet controller
                applicationSet:
                  enabled: true
                  ingress:
                    enabled: true
                    ingressClassName: "nginx"
                    annotations:
                      nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
                    hostname: argocd-appset-{{ .Values.loft.virtualClusterName }}.{{ .Values.loft.clusterAnnotations.domain }}
                    tls: true
          - name: github-repo-argo-cd-webhooks
        objects: |
          apiVersion: demo.loft.sh/v1alpha1
          kind: DemoRepository
          metadata:
            name: github-repo
            namespace: default
          spec:
            name: "{{ .Values.loft.virtualClusterName }}-app"
            loftDemoDomain: "{{ .Values.loft.virtualClusterName }}.{{ .Values.loft.clusterAnnotations.domain }}"
            virtualClusterName: "{{ .Values.loft.virtualClusterName }}"
            virtualClusterNamespace: "{{ .Values.loft.virtualClusterNamespace }}"
          ---
          apiVersion: apiextensions.k8s.io/v1
          kind: CustomResourceDefinition
          metadata:
            name: users.storage.loft.sh
          spec:
            group: storage.loft.sh
            names:
              plural: users
              singular: user
              kind: User
              listKind: UserList
            scope: Cluster
            versions:
              - name: v1
                served: true
                storage: true
                schema:
                  openAPIV3Schema:
                    description: User holds the user information
                    type: object
                    properties:
                      apiVersion:
                        description: |-
                          APIVersion defines the versioned schema of this representation of an object.
                          Servers should convert recognized schemas to the latest internal value, and
                          may reject unrecognized values.
                          More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
                        type: string
                      kind:
                        description: |-
                          Kind is a string value representing the REST resource this object represents.
                          Servers may infer this from the endpoint the client submits requests to.
                          Cannot be updated.
                          In CamelCase.
                          More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
                        type: string
                      metadata:
                        type: object
                      spec:
                        type: object
                        properties:
                          access:
                            description: Access holds the access rights for users and teams
                            type: array
                            items:
                              description: Access describes the access to a secret
                              type: object
                              required:
                                - verbs
                              properties:
                                name:
                                  description: Name is an optional name that is used for this access rule
                                  type: string
                                subresources:
                                  description: Subresources defines the sub resources that are allowed by this access rule
                                  type: array
                                  items:
                                    type: string
                                teams:
                                  description: Teams specifies which teams should be able to access this secret with the aforementioned verbs
                                  type: array
                                  items:
                                    type: string
                                users:
                                  description: Users specifies which users should be able to access this secret with the aforementioned verbs
                                  type: array
                                  items:
                                    type: string
                                verbs:
                                  description: Verbs is a list of Verbs that apply to ALL the ResourceKinds and AttributeRestrictions contained in this rule. VerbAll represents all kinds.
                                  type: array
                                  items:
                                    type: string
                          clusterRoles:
                            description: ClusterRoles define the cluster roles that the users should have assigned in the cluster.
                            type: array
                            items:
                              type: object
                              properties:
                                name:
                                  description: Name is the cluster role to assign
                                  type: string
                          codesRef:
                            description: A reference to the users access keys
                            type: object
                            properties:
                              key:
                                type: string
                              secretName:
                                type: string
                              secretNamespace:
                                type: string
                          description:
                            description: Description describes a cluster access object
                            type: string
                          disabled:
                            description: |-
                              If disabled is true, an user will not be able to login anymore. All other user resources
                              are unaffected and other users can still interact with this user
                            type: boolean
                          displayName:
                            description: The display name shown in the UI
                            type: string
                          email:
                            description: The users email address
                            type: string
                          extraClaims:
                            description: ExtraClaims are additional claims that have been added to the user by an admin.
                            type: object
                            additionalProperties:
                              type: string
                          groups:
                            description: The groups the user has access to
                            type: array
                            items:
                              type: string
                          icon:
                            description: The URL to an icon that should be shown for the user
                            type: string
                          imagePullSecrets:
                            description: |-
                              ImagePullSecrets holds secret references to image pull
                              secrets the user has access to.
                            type: array
                            items:
                              description: KindSecretRef is the reference to a secret containing the user password
                              type: object
                              properties:
                                apiGroup:
                                  description: APIGroup is the api group of the secret
                                  type: string
                                key:
                                  type: string
                                kind:
                                  description: Kind is the kind of the secret
                                  type: string
                                secretName:
                                  type: string
                                secretNamespace:
                                  type: string
                          owner:
                            description: Owner holds the owner of this object
                            type: object
                            properties:
                              team:
                                description: Team specifies a Loft team.
                                type: string
                              user:
                                description: User specifies a Loft user.
                                type: string
                          passwordRef:
                            description: A reference to the user password
                            type: object
                            properties:
                              key:
                                type: string
                              secretName:
                                type: string
                              secretNamespace:
                                type: string
                          ssoGroups:
                            description: |-
                              SSOGroups is used to remember groups that were
                              added from sso.
                            type: array
                            items:
                              type: string
                          subject:
                            description: The user subject as presented by the token
                            type: string
                          tokenGeneration:
                            description: TokenGeneration can be used to invalidate all user tokens
                            type: integer
                            format: int64
                          username:
                            description: The username that is used to login
                            type: string
                      status:
                        description: UserStatus holds the status of an user
                        type: object
                        properties:
                          teams:
                            description: Teams the user is currently part of
                            type: array
                            items:
                              type: string
                subresources:
                  status: {}
            conversion:
              strategy: None
          ---
          apiVersion: v1
          kind: Namespace
          metadata:
            name: vcluster-platform
          ---
          apiVersion: v1
          kind: Secret
          metadata:
            name: oidc-secret
            namespace: vcluster-platform
            labels:
              loft.sh/project-secret-name: oidc-secret
          type: Opaque
          ---
          apiVersion: v1
          kind: Secret
          metadata:
            name: demo-admin-access-key
            namespace: vcluster-platform
            labels:
              loft.sh/project-secret-name: demo-admin-access-key
          type: Opaque
          ---
          apiVersion: v1
          kind: Secret
          metadata:
            name: ghcr-login-secret
            namespace: vcluster-platform
            labels:
              loft.sh/project-secret-name: ghcr-login-secret
          data:
            .dockerconfigjson: e30K
          type: kubernetes.io/dockerconfigjson
          ---
          apiVersion: v1
          kind: Namespace
          metadata:
            name: argocd
          ---
          apiVersion: v1
          kind: Secret
          metadata:
            name: loft-demo-org-cred
            namespace: argocd
            labels:
              argocd.argoproj.io/secret-type: repo-creds
              loft.sh/project-secret-name: loft-demo-org-cred
          type: Opaque
          ---
          apiVersion: v1
          kind: Secret
          metadata:
            name: oidc-secret
            namespace: argocd
            labels:
              loft.sh/project-secret-name: oidc-secret
          type: Opaque
          ---
          apiVersion: v1
          kind: Secret
          metadata:
            labels:
              argocd.argoproj.io/secret-type: cluster
              loftDemoDomain: {{ .Values.loft.virtualClusterName }}.{{ .Values.loft.clusterAnnotations.domain }}
              autoSnapshots: '{{ .Values.autoSnapshots }}'
              connectedHostCluster: '{{ .Values.connectedHostCluster }}'
              crossplane: 'true'
              vnode: '{{ .Values.vnode }}'
              flux: 'true'
              virtualScheduler: '{{ .Values.virtualScheduler }}'
              resolveDNS: '{{ .Values.resolveDNS }}'
              eso: 'true'
              kyverno: '{{ .Values.kyverno }}'
              postgres: '{{ .Values.postgres }}'
              mysql: '{{ .Values.mysql }}'
              rancher: '{{ .Values.rancher }}'
            name: cluster-local
            namespace: argocd
          stringData:
            config: '{"tlsClientConfig":{"insecure":false}}'
            name: in-cluster
            server: https://kubernetes.default.svc
          type: Opaque
          ---
          apiVersion: v1
          kind: Namespace
          metadata:
            name: crossplane-system
          ---
          apiVersion: v1
          kind: Secret
          metadata:
            name: github-provider-secret
            namespace: crossplane-system
            labels:
              loft.sh/project-secret-name: crossplane-github-provider-secret
          type: Opaque
          ---
          apiVersion: node.k8s.io/v1
          kind: RuntimeClass
          metadata:
            name: vnode
          handler: vnode
          ---
          apiVersion: v1
          kind: Secret
          metadata:
            name: admin-user-password
            namespace: vcluster-platform
          stringData:
            value: '{{ .Values.password }}'
          ---
          kind: User
          apiVersion: storage.loft.sh/v1
          metadata:
            name: '{{ .Values.username }}'
          spec:
            displayName: '{{ .Values.username }}'
            username: '{{ .Values.username }}'
            email: '{{ .Values.email }}'
            subject: '{{ .Values.email }}'
            passwordRef:
              secretName: admin-user-password
              secretNamespace: vcluster-platform
              key: value
            access:
              - name: loft-access
                verbs:
                  - get
                  - bind
                  - create
                  - deletekey
                  - getkey
                  - updatekey
                  - createkey
                subresources:
                  - accesskeys
                  - clusters
                  - profile
                  - permissions
                  - object-permissions
                users:
                  - '{{ .Values.username }}'
          status:
            teams:
              - loft-admins

        pro:
          enabled: true
        helmRelease:
          chart:
            version: 0.32.1
          values: |
            deletion:
              auto:
                afterInactivity: 366h
            sleep:
              auto:
                afterInactivity: 9h
                timezone: '{{ .Values.sleepTimeZone }}'
            sync:
              toHost:
                ingresses:
                  enabled: true
                pods:
                  enabled: true
                  runtimeClassName: vnode
                customResources:
                  demorepositories.demo.loft.sh:
                    enabled: true
              fromHost:
                nodes:
                  enabled: true
            policies:
              networkPolicy:
                enabled: true
              resourceQuota:
                enabled: true
            controlPlane:
              backingStore:
                etcd:
                  embedded:
                    enabled: true
              distro:
                k8s:
                  version: '{{ .Values.k8sVersion }}'
              coredns:
                embedded: true
              statefulSet:
                persistence:
                  volumeClaim:
                    size: 10Gi
                    storageClass: premium-rwo
                resources:
                  # Limits are resource limits for the container
                  limits:
                    ephemeral-storage: 4Gi
                    memory: 2Gi
                    cpu: 2
                  # Requests are minimal resources that will be consumed by the container
                  requests:
                    ephemeral-storage: 500Mi
                    cpu: 500m
                    memory: 1Gi
        accessPoint:
          ingress: {}
        spaceTemplate:
          metadata: {}
          objects: |-
            apiVersion: v1
            kind: Secret
            metadata:
              name: argo-webhook-url
            type: Opaque
            stringData:
              url: "https://argocd-{{ .Values.loft.virtualClusterName }}.{{ .Values.loft.clusterAnnotations.domain }}/api/webhook"
            ---
            apiVersion: v1
            kind: Secret
            metadata:
              name: argo-appset-webhook-url
            type: Opaque
            stringData:
              url: "https://argocd-appset-{{ .Values.loft.virtualClusterName }}.{{ .Values.loft.clusterAnnotations.domain }}/api/webhook"
      parameters:
        - variable: autoSnapshots
          label: Automatic Snapshots
          description: This demo use case creates a Virtual Cluster Instance from a template. The automatic snapshots that are pushed to a GitHub Container Registry. 
          type: boolean
          defaultValue: 'false'
          section: Use Case Examples
        - variable: vnode
          label: vNode with vCluster
          description: >-
            The use case examples installed will highlight the integration of
            vNode with vCluster and can be used to demonstrate the
            hard-mulitenant isolation provided by vNode for vCluster workloads
            (requires some manual configuration).
          type: boolean
          defaultValue: 'false'
          section: Use Case Examples
        - variable: namespaceSync
          label: Namespace Sync
          description: This demo use case syncs vCluster namespaces to matching physical namespaces so Argo CD Applications created inside a vCluster appear and sync with the same, easy to identify name into a shared Argo CD instance running on the host cluster. 
          type: boolean
          defaultValue: 'false'
          section: Use Case Examples
        - variable: mysql
          label: vCluster Platform Database Connector
          description: >-
            Installs the MySQL Operator for Kubernetes and creates a MySQL
            InnoDB Cluster configured to be used with the vCluster Platform
            database connector feature and a Virtual Cluster Template.
          type: boolean
          defaultValue: 'false'
          section: Use Case Examples
        - variable: resolveDNS
          label: Resolve DNS
          description: >-
            This feature allows custom DNS rules in a vCluster, enabling
            communication with host cluster services and services in other
            vCluster instances.
          type: boolean
          defaultValue: 'false'
          section: Use Case Examples
        - variable: virtualScheduler
          label: Using Kubernetes Schedulers Inside vCluster
          description: >-
            Showcase how to enable the virtual scheduler feature and use
            third-party schedulers (Volcano, KAI, etc) inside of a vCluster.
          type: boolean
          defaultValue: 'false'
          section: Use Case Examples
        - variable: k8sVersion
          label: k8sVersion
          description: Please select Kubernetes version
          type: string
          options:
            - v1.35.2
            - v1.34.5
            - v1.33.9
            - v1.32.13
          defaultValue: v1.34.5
          section: vCluster Config
        - variable: sleepTimeZone
          label: Sleep Time Zone
          description: >-
            Environment for deployments for this vCluster used as cluster label
            for Argo CD ApplicationSet Cluster Generator
          type: string
          options:
            - 'America/Los_Angeles'
            - 'America/New_York'
            - 'Europe/London'
          defaultValue: 'America/New_York'
          section: vCluster Config
        - variable: env
          label: Deployment Environment
          description: >-
            Environment for deployments for this vCluster used as cluster label
            for Argo CD ApplicationSet Cluster Generator
          type: string
          options:
            - dev
            - qa
            - prod
          defaultValue: dev
          section: vCluster Config
        - variable: uiLogoURL
          label: UI Logo uiLogoURL
          description: Allows overriding default ui settings logo
          type: string
          section: UI Customization
        - variable: logoBackgroundColor
          label: Logo Background Color
          description: >-
            Color value to use as the background color for the logo (#cfcfcf is
            a good for darker logos, #001529 for lighter logos)
          type: string
          defaultValue: '#001529'
          section: UI Customization
        - variable: username
          label: Admin Username
          description: Your admin username for vCluster Platform
          type: string
          required: true
          section: vCluster Platform Config
        - variable: password
          label: Admin Password
          description: Your admin password for vCluster Platform
          type: password
          required: true
          section: vCluster Platform Config
        - variable: email
          label: Admin Email
          description: Your admin email for vCluster Platform
          type: string
          validation: '^[^@\s]+@[^@\s]+\.[^@\s]+$'
          section: vCluster Platform Config
  access:
    - verbs:
        - '*'
      subresources:
        - '*'
      users:
        - admin
status: {}
