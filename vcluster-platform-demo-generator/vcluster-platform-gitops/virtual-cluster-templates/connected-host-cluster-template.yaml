kind: VirtualClusterTemplate
apiVersion: management.loft.sh/v1
metadata:
  name: connected-host-cluster
  labels:
    patchType: versioned
spec:
  displayName: Connected Host Cluster Virtual Cluster Template
  description: This virtual cluster template deploys a vCluster to be used as a connected host cluster.
  owner:
    team: loft-admins
  template:
    metadata: {}
    instanceTemplate:
      metadata: {}
    pro: {}
    helmRelease:
      chart:
        version: 0.24.0
      values: |-
        sync:
          toHost:
            ingresses:
              enabled: true

        # Checkout https://vcluster.com/pro/docs/ for more config options
    accessPoint:
      ingress: {}
    spaceTemplate:
      metadata: {}
  versions:
    - version: 1.0.0
      template:
        metadata:
          annotations:
            sleepmode.loft.sh/ignore-user-agents: argo*
        instanceTemplate:
          metadata:
            labels:
              env: '{{ .Values.env }}'
              demos.vcluster.com/project: '{{ .Values.loft.project }}'
              demos.vcluster.com/owner: '{{ or (and .Values.loft.user .Values.loft.user.name) (and .Values.loft.team .Values.loft.team.name) }}'
        pro:
          enabled: true
        helmRelease:
          chart:
            version: 0.32.1
          values: |
            deletion:
              auto:
                afterInactivity: 366h
            sleep:
              auto:
                afterInactivity: 14h
                wakeup:
                  schedule: 0 4 * * 1-5
                timezone: '{{ .Values.sleepTimeZone }}'
                  
            sync:
              toHost:
                ingresses:
                  enabled: true
            controlPlane:
              distro:
                k8s:
                  image:
                    tag: "{{ .Values.k8sVersion }}"
              statefulSet:
                persistence:
                  volumeClaim:
                    size: 10Gi
                    storageClass: premium-rwo
                resources:
                  # Limits are resource limits for the container
                  limits:
                    ephemeral-storage: 8Gi
                    memory: 4Gi
                    cpu: 2
                  # Requests are minimal resources that will be consumed by the container
                  requests:
                    ephemeral-storage: 500Mi
                    cpu: 500m
                    memory: 1Gi
              # Use an embedded managed etcd server instead of using the default SQLite backend
              backingStore:
                etcd:
                  embedded:
                    enabled: true
              coredns:
                embedded: true

        accessPoint:
          ingress: {}
        spaceTemplate:
          metadata: {}
          apps: # this bash app will create a Kube Config `ProjectSecret` that uses the vCluster Platform proxied URL and may be injected in demo vCluster instances
            - name: generate-vcluster-kubeconfig
      parameters:
        - variable: k8sVersion
          label: k8sVersion
          description: Please select Kubernetes version
          type: string
          options:
            - v1.35.2
            - v1.34.5
            - v1.33.9
            - v1.32.13
          defaultValue: v1.34.5
          section: vCluster Config
        - variable: sleepTimeZone
          label: Sleep Time Zone
          description: >-
            Timezone used for sleep mode configuration.
          type: string
          options:
            - 'America/Los_Angeles'
            - 'America/New_York'
            - 'Europe/London'
          defaultValue: 'America/New_York'
          section: vCluster Config
    - template:
        metadata: {}
        instanceTemplate:
          metadata: {}
        pro:
          enabled: true
        helmRelease:
          chart:
            version: 0.26.0
          values: |-
            sync:
              toHost:
                ingresses:
                  enabled: true
            # Checkout https://vcluster.com/pro/docs/ for more config options
        accessPoint:
          ingress: {}
        spaceTemplate:
          metadata: {}
      version: 0.0.0
  access:
    - verbs:
        - '*'
      subresources:
        - '*'
      users:
        - admin
