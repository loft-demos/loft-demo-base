apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: xdemorepositories.demo.loft.sh
spec:
  claimNames:
    kind: DemoRepository
    plural: demorepositories
  defaultCompositeDeletePolicy: Background
  defaultCompositionUpdatePolicy: Automatic
  group: demo.loft.sh
  names:
    kind: XDemoRepository
    plural: xdemorepositories
  versions:
    - name: v1alpha1
      referenceable: true
      schema:
        openAPIV3Schema:
          description: >-
            A GitHub vCluster Platform demo repository used for platform gitops
            and other demo examples.
          properties:
            spec:
              properties:
                gitTargetRevision:
                  default: main
                  description: Git branch to use for the generated repository default branch and seed commit target
                  type: string
                includeAllTemplateBranches:
                  default: false
                  description: Include all branches from the template repository when creating the generated repository
                  type: boolean
                loftDemoDomain:
                  description: vCluster Platform demo domain
                  type: string
                name:
                  description: Repo name
                  type: string
                virtualClusterName:
                  description: Name for vCluster instance
                  type: string
                virtualClusterNamespace:
                  description: Namespace for vCluster instance
                  type: string
              required:
                - name
                - virtualClusterNamespace
                - loftDemoDomain
              type: object
            status:
              properties:
                defaultBranch:
                  properties:
                    id:
                      type: string
                  type: object
                repository:
                  properties:
                    id:
                      type: string
                  type: object
              type: object
          type: object
      served: true
