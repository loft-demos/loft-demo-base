apiVersion: management.loft.sh/v1
kind: App
metadata:
  name: demo-vcluster-platform-configure-admins
spec:
  displayName: Demo vCluster Platform Configure Admins
  description: Configures SSO Groups that should get admin privileges
  owner:
    team: loft-admins
  config:
    chart: {}
    bash:
      script: |-
        set -euo pipefail

        ensure_argocd_secret() {
          echo "Ensuring argocd namespace exists..."
          kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -

          existing_key="$(kubectl get secret argocd-secret -n argocd -o jsonpath='{.data.server\.secretkey}' 2>/dev/null || true)"
          if [ -n "${existing_key}" ]; then
            echo "argocd-secret already has server.secretkey"
            return
          fi

          server_secretkey="$(dd if=/dev/urandom bs=36 count=1 2>/dev/null | base64 | tr -d '\n' | tr '+/' '-_')"

          if kubectl get secret argocd-secret -n argocd >/dev/null 2>&1; then
            echo "Patching argocd-secret with server.secretkey..."
            kubectl patch secret argocd-secret -n argocd --type merge -p "{\"stringData\":{\"server.secretkey\":\"${server_secretkey}\"}}"
          else
            echo "Creating argocd-secret with server.secretkey..."
            kubectl create secret generic argocd-secret -n argocd --from-literal=server.secretkey="${server_secretkey}"
          fi
        }

        ensure_argocd_secret

        kubectl wait --for=condition=Available --timeout=300s apiservice/v1.management.loft.sh

        until kubectl get teams.management.loft.sh loft-admins >/dev/null 2>&1; do
          echo "Waiting for team..."
          sleep 1
        done

        cat <<'EOF' | kubectl apply -f -
        kind: Team
        apiVersion: management.loft.sh/v1
        metadata:
          name: loft-admins
        spec:
          displayName: Global Admins
          description: All users in this team have full admin access to all clusters
          username: loftadmins
          groups:
            - loft:admins
            - Administration
            - Design
            - DevRel
            - Engineering
            - Marketing
            - Product
            - Sales
          clusterRoles:
            - name: loft-management-admin
          access:
            - name: loft-access
              verbs:
                - get
                - bind
              subresources:
                - clusters
              teams:
                - loft-admins
        EOF

        kubectl annotate --overwrite cluster loft-cluster \
          domainPrefix="{{ .Values.loft.virtualClusterName }}" \
          domain="{{ .Values.loft.clusterAnnotations.domain }}"

        kubectl delete project default
